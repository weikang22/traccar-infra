services:
  database:
    image: mariadb:11.8
    container_name: traccar-db
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: traccar
      MYSQL_USER: traccar
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    
    volumes:
      - /opt/traccar/database:/var/lib/mysql

  traccar: #service name
    image: traccar/traccar:6.14.5 #docker image and version tag
    container_name: traccar #container name
    restart: unless-stopped #restart unless manually stopped

    depends_on:
      - database
    
    ports:
      - "8082:8082" #web UI port
      - "5023:5023" #tracker-specific port

    volumes:
      - /opt/traccar/logs:/opt/traccar/logs:rw #bind mount for logs - read and write
      - /opt/traccar/data:/opt/traccar/data:rw #bind mount for data - read and write
      - /opt/traccar/conf/traccar.xml:/opt/traccar/conf/traccar.xml:ro #bind mount for configuration file - read only